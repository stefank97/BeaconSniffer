services:
  postgres:
    image: postgres:16
    container_name: iot-postgres
    environment:
      POSTGRES_DB: iot_wifi
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: iot-backend
    depends_on:
      - postgres
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iot_wifi
      DB_USER: iotuser
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WS_TOKEN: ${WS_TOKEN}
    restart: unless-stopped
